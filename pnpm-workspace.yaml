packages:
  - "apps/*"

# pnpm 10 blocks dependency build scripts by default; the @platform/* packages
# each carry a `prepare` (tsc) build, so this allowlist is required or they
# install without dist/ (platform-contracts/CONSUMING.md).
onlyBuiltDependencies:
  - "@platform/contracts"
  - "@platform/kernel-types"
  - "@platform/i18n"
  - "@platform/ui-tokens"

# Inter-package version-deps exist on no registry: @platform/contracts →
# @platform/kernel-types. Route every transitive resolution through the same
# pinned release sha (ba6f16d — canon v0.9.6) so nothing drifts off-pin.
overrides:
  "@platform/contracts": "git+https://github.com/beurni2/platform-contracts.git#ba6f16d78a2a5a13ff6877237cef6d77d35d8d65&path:packages/contracts"
  "@platform/kernel-types": "git+https://github.com/beurni2/platform-contracts.git#ba6f16d78a2a5a13ff6877237cef6d77d35d8d65&path:packages/kernel-types"
  "@platform/ui-tokens": "git+https://github.com/beurni2/platform-contracts.git#ba6f16d78a2a5a13ff6877237cef6d77d35d8d65&path:packages/ui-tokens"
