packages:
  - "apps/*"

# pnpm 10 blocks dependency build scripts by default; the @platform/* packages
# each carry a `prepare` (tsc) build, so this allowlist is required or they
# install without dist/ (platform-contracts/CONSUMING.md).
onlyBuiltDependencies:
  - "@platform/contracts"
  - "@platform/kernel-types"
  - "@platform/i18n"
  - "@platform/ui-tokens"

# Inter-package version-deps exist on no registry: @platform/contracts →
# @platform/kernel-types — both pinned to d7b27bb / canon v1.2.0 for the shared
# read-model kit (WO-OPS-DESK-6-KIT). @platform/ui-tokens + @platform/i18n stay
# at 67bda02 / v0.9.8 DELIBERATELY: ui-tokens 1.2.0 restructures its token API
# (new faso-premium palette; `money`/`spacing`/`sharedColour.sand` gone), a
# console-wide restyle that is its own WO — flagged, not silently dragged in.
# ui-tokens depends on no @platform package, so this split is transitively clean.
overrides:
  "@platform/contracts": "git+https://github.com/beurni2/platform-contracts.git#d7b27bb895667f751d522680282549f16335e631&path:packages/contracts"
  "@platform/kernel-types": "git+https://github.com/beurni2/platform-contracts.git#d7b27bb895667f751d522680282549f16335e631&path:packages/kernel-types"
  "@platform/ui-tokens": "git+https://github.com/beurni2/platform-contracts.git#67bda02646019cb4ab28a16fadf388b522da2799&path:packages/ui-tokens"
